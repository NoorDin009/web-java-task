<body>
<h1>learning java</h1>

<img id="myImage" onclick="changeImage()" src="red.jpeg" width="100" height="180">

<p>Click the image to change color.</p>

<script>
function changeImage() {
    var image = document.getElementById('myImage');

    if (image.src.includes("red.jpeg")) {
        image.src = "black.png";
    } else {
        image.src = "red.jpeg";
    }
}
</script>

</body>
